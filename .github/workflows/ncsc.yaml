name: NCSC CSAF Harvester

on:
  schedule:
    - cron: "0 * * * 1-5"
    - cron: "55 21 * * 6,0"
    - cron: "55 22 * * 6,0"
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback window in days"
        required: false
        default: "1"

permissions:
  contents: write

concurrency:
  group: ncsc-csaf-harvester-${{ github.ref }}
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: self-hosted

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      LOOKBACK_DAYS: ${{ github.event.inputs.days || '1' }}

    steps:
      - name: Weekend 23:55 Europe/Amsterdam gate
        run: |
          DOW=$(TZ=Europe/Amsterdam date +%u)
          HM=$(TZ=Europe/Amsterdam date +%H:%M)
          if [ "$DOW" -ge 6 ] && [ "$HM" != "23:55" ]; then
            echo "Weekend en lokale tijd is $HM, niet 23:55 — job wordt overgeslagen."
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      
      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Harvest CSAF -> CSV + JSONL
        run: python harvest_ncsc.py --days "${LOOKBACK_DAYS}"

      - name: Notify high-risk (Telegram + dedupe)
        run: python notify_ncsc.py

      - name: Commit & push outputs/state
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/daily output/jsonl output/sent_cache.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Automated NCSC advisories update"
          git push origin HEAD:main
