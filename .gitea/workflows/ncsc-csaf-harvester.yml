name: NCSC CSAF Harvester

on:
  schedule:
    - cron: "0 * * * 1-5"
    - cron: "55 21 * * 6,0"
    - cron: "55 22 * * 6,0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ncsc-csaf-harvester-${{ gitea.ref }}
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: self-hosted

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      debug: "1"

    steps:
      - name: Weekend 23:55 Europe/Amsterdam gate
        run: |
          echo "UTC:   $(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "Local: $(TZ=Europe/Amsterdam date '+%Y-%m-%d %H:%M:%S %Z')"

          DOW=$(TZ=Europe/Amsterdam date +%u)
          HM=$(TZ=Europe/Amsterdam date +%H:%M)

          if [ "$DOW" -ge 6 ] && [ "$HM" != "23:55" ]; then
            echo "Weekend en lokale tijd is $HM, niet 23:55 — job wordt overgeslagen."
            exit 0
          fi

      - name: Checkout
        uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Harvest CSAF -> CSV
        run: python harvest_ncsc.py

      - name: Notify high-risk Telegram + dedupe
        run: python notify_ncsc.py

      - name: Commit & push outputs/state
        run: |
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@local"

          git add output 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated NCSC advisories update"
            git pull --rebase --autostash
            git push
          fi
